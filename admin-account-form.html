<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Susan Coffee - Thêm tài khoản</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/css/admin.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-3">
      <h3 class="text-center mb-4">Susan Coffee<br />ADMIN</h3>
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a href="admin-dashboard.html" class="nav-link">Tổng quan</a>
        </li>
        <li class="nav-item mb-2">
          <a href="admin-accounts.html" class="nav-link active"
            >Quản lý Tài khoản</a
          >
        </li>
        <li class="nav-item mb-2">
          <a href="admin-products.html" class="nav-link">Quản lý Sản phẩm</a>
        </li>
        <li class="nav-item mb-2">
          <a href="admin-tables.html" class="nav-link">Quản lý Bàn</a>
        </li>
        <li class="nav-item mt-5 border-top">
          <a href="#" class="nav-link">Đăng xuất</a>
        </li>
      </ul>
    </div>

    <!-- Nội dung chính -->
    <div class="content">
      <div class="card shadow">
        <div class="card-body">
          <h4 class="card-title mb-4">Thêm tài khoản mới</h4>
          <form>
            <div class="row row-cols-2">
              <div class="mb-3">
                <label for="phone" class="form-label">Số điện thoại</label>
                <input
                  type="text"
                  class="form-control"
                  id="phone"
                  placeholder="Nhập số điện thoại"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="fullname" class="form-label">Họ và tên</label>
                <input
                  type="text"
                  class="form-control"
                  id="fullname"
                  placeholder="Nhập họ và tên"
                  required
                />
              </div>
            </div>
            <div class="row row-cols-2">
              <div class="mb-3">
                <label for="role" class="form-label">Vai trò</label>
                <select class="form-select" id="role" required>
                  <option value="">-- Chọn vai trò --</option>
                  <option value="customer">Khách hàng</option>
                  <option value="staff">Nhân viên</option>
                  <option value="admin">Quản trị</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="status" class="form-label">Trạng thái</label>
                <select class="form-select" id="status" required>
                  <option value="active">Hoạt động</option>
                  <option value="inactive">Tạm khóa</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Mật khẩu</label>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>
            <button type="submit" class="btn btn-dark">Lưu tài khoản</button>
            <a href="admin-accounts.html" class="btn btn-outline-secondary"
              >Hủy</a
            >
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
